<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  
  <title>Průměr známek</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jacquard+24&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --accent: #f5c842;
      --accent-dim: #1e1c14;
      --bg: #111;
      --bg2: #1a1a1a;
      --bg3: #222;
      --border: #2a2a2a;
      --text: #fff;
      --muted: #666;
      --muted2: #888;
      --danger: #e05555;
      --success: #42c47a;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 480px;
      padding: 36px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    @media (min-width: 768px) {
      .app {
        max-width: 900px;
        flex-direction: row;
        gap: 48px;
        align-items: flex-start;
        padding-top: 60px;
      }
      .dashboard {
        flex: 1;
        position: sticky;
        top: 60px;
      }
      .editor {
        flex: 1.5;
      }
    }

    .logo {
      font-family: 'Jacquard 24', system-ui;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.4;
    }

    /* Result cards */
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    @media (min-width: 768px) {
      .results { grid-template-columns: 1fr; }
    }

    .res-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .res-card.primary {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .res-card-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .res-card-val {
      font-size: 42px;
      font-weight: 500;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .res-card.primary .res-card-val { color: var(--accent); }

    .res-card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .grade-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .stat-pill {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted2);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-pill i { font-size: 13px; }
    .stat-pill b { color: var(--text); font-weight: 500; }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: #ccc;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s;
    }

    .btn:active { transform: scale(0.97); background: var(--bg3); }
    @media (hover: hover) { .btn:hover { background: var(--bg3); } }
    
    .btn.accent {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
      font-weight: 500;
    }
    .btn.accent:active { background: #e0b530; }
    @media (hover: hover) { .btn.accent:hover { background: #e0b530; } }

    /* ── Import XML ────────────────────────────── */

    .import-bar {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .import-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .import-drop {
      width: 100%;
      height: 52px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      position: relative;
    }

    .import-drop:hover, .import-drop.drag-over {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .import-drop input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* Subject picker modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(16px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .modal-sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .subject-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      padding-right: 2px;
    }

    .subject-list::-webkit-scrollbar { width: 4px; }
    .subject-list::-webkit-scrollbar-track { background: transparent; }
    .subject-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .subject-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg3);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
      gap: 12px;
    }

    .subject-item:hover, .subject-item:focus {
      border-color: var(--accent);
      background: var(--accent-dim);
      outline: none;
    }

    .subject-item-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .subject-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .subject-item-count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .subject-item-avg {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(245,200,66,0.2);
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .modal-footer {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }

    .modal-footer .btn { flex: 1; }

    /* Table */
    .table-header {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 28px;
      gap: 8px;
      padding: 0 2px 8px;
    }

    .table-header span {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .rows-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row-item {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 28px;
      gap: 8px;
      align-items: center;
    }

    .row-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    input[type=text] {
      width: 100%;
      height: 48px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type=text]::placeholder { color: var(--muted); font-weight: 400; font-size: 15px; }
    input[type=text]:focus { border-color: var(--accent); background: var(--accent-dim); }
    input[type=text].error { border-color: var(--danger) !important; background: rgba(224,85,85,0.1); }

    .del-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .del-btn:active { background: rgba(224,85,85,0.15); border-color: var(--danger); color: var(--danger); }
    @media (hover: hover) { .del-btn:hover { background: rgba(224,85,85,0.15); border-color: var(--danger); color: var(--danger); } }
    .del-spacer { width: 28px; }

    .add-btn {
      width: 100%;
      height: 48px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 8px 0 28px;
      transition: all 0.15s;
    }
    .add-btn:active, .add-btn:hover { border-color: #444; color: #aaa; }

    /* Imported subject banner */
    .subject-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--accent);
    }
    .subject-banner.visible { display: flex; }
    .subject-banner i { font-size: 14px; flex-shrink: 0; }
    .subject-banner-name { font-weight: 500; flex: 1; }
    .subject-banner-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.12s;
    }
    .subject-banner-clear:hover { color: var(--danger); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #222;
      border: 1px solid #333;
      border-radius: 99px;
      padding: 12px 24px;
      font-size: 14px;
      color: #ccc;
      white-space: nowrap;
      transition: transform 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">
  <div class="dashboard">
    <div class="logo">Průměr <span>známek</span></div>
    <div class="subtitle">Zadej známky a volitelně váhy — výsledek se počítá živě. Ideální pro rychlý přehled.</div>

    <div class="results">
      <div class="res-card primary">
        <div class="res-card-label">Vážený průměr</div>
        <div class="res-card-val" id="wVal">—</div>
        <div class="res-card-sub" id="wSub">Zadej alespoň 1 známku</div>
        <div id="gradeBadge"></div>
      </div>
      <div class="res-card">
        <div class="res-card-label">Aritmetický průměr</div>
        <div class="res-card-val" id="aVal">—</div>
        <div class="res-card-sub" id="aSub">Průměr bez vah</div>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-pill"><i class="bi bi-list-ol"></i><span><b id="stCount">0</b> známek</span></div>
      <div class="stat-pill"><i class="bi bi-activity"></i><span>Součet vah: <b id="stWeights">—</b></span></div>
      <div class="stat-pill"><i class="bi bi-arrow-down-up"></i><span>Min/Max: <b id="stMinMax">—</b></span></div>
    </div>

    <div class="actions">
      <button class="btn" onclick="resetAll()"><i class="bi bi-trash3"></i> Vymazat</button>
      <button class="btn accent" onclick="copyResult()"><i class="bi bi-clipboard"></i> Kopírovat</button>
    </div>

    <!-- Import sekce -->
    <div class="import-bar">
      <div class="import-label"><i class="bi bi-file-earmark-spreadsheet"></i> Import z i4 XML</div>
      <label class="import-drop" id="importDrop">
        <i class="bi bi-upload"></i>
        <span id="importDropText">Nahrát export XML…</span>
        <input type="file" accept=".xml" id="xmlFileInput">
      </label>
    </div>

    <div style="height: 32px; display: block;" class="mobile-spacer"></div>
  </div>

  <div class="editor">
    <!-- Banner importovaného předmětu -->
    <div class="subject-banner" id="subjectBanner">
      <i class="bi bi-mortarboard"></i>
      <span class="subject-banner-name" id="subjectBannerName"></span>
      <button class="subject-banner-clear" onclick="clearSubject()" title="Zrušit import">
        <i class="bi bi-x"></i>
      </button>
    </div>

    <div class="table-header">
      <span></span>
      <span>Známka</span>
      <span>Váha</span>
      <span></span>
    </div>

    <div class="rows-area" id="rowsArea"></div>

    <button class="add-btn" id="addBtn" onclick="addRow()">
      <i class="bi bi-plus-lg"></i> Přidat řádek
    </button>
  </div>
</div>

<!-- Modal výběr předmětu -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Vybrat předmět</div>
    <div class="modal-sub" id="modalSub">Načteno předmětů z XML</div>
    <div class="subject-list" id="subjectList"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()"><i class="bi bi-x"></i> Zavřít</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Rows state ───────────────────────────────────────────
  let rows = [];
  let nextId = 0;
  let importedSubjects = []; // parsed from XML

  function addRow(gradeVal = '', weightVal = '') {
    const id = nextId++;
    rows.push({ id, grade: gradeVal, weight: weightVal });
    renderRows();
    if (!gradeVal) {
      const inputs = document.querySelectorAll('.grade-input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }
  }

  function removeRow(id) {
    rows = rows.filter(r => r.id !== id);
    if (rows.length === 0) { addRow(); addRow(); }
    else { renderRows(); recalc(); }
  }

  function renderRows() {
    const area = document.getElementById('rowsArea');
    area.innerHTML = '';
    rows.forEach((row, idx) => {
      const div = document.createElement('div');
      div.className = 'row-item';
      const showDel = rows.length > 1;
      div.innerHTML = `
        <div class="row-num">${idx + 1}</div>
        <input class="grade-input" type="text" inputmode="decimal"
          value="${row.grade}" placeholder="1–5"
          aria-label="Řádek ${idx+1} Známka"
          data-id="${row.id}" data-field="grade" autocomplete="off" />
        <input class="weight-input" type="text" inputmode="decimal"
          value="${row.weight}" placeholder="(váha)"
          aria-label="Řádek ${idx+1} Váha"
          data-id="${row.id}" data-field="weight" autocomplete="off" />
        ${showDel
          ? `<button class="del-btn" aria-label="Odstranit řádek ${idx+1}" onclick="removeRow(${row.id})"><i class="bi bi-x"></i></button>`
          : '<div class="del-spacer"></div>'}
      `;
      area.appendChild(div);
    });

    area.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', function () {
        const id = +this.dataset.id;
        const field = this.dataset.field;
        const r = rows.find(r => r.id === id);
        if (r) {
          r[field] = this.value;
          this.classList.remove('error');
          recalc();
          if (field === 'grade') {
            const gradeInputs = document.querySelectorAll('.grade-input');
            const lastGradeInput = gradeInputs[gradeInputs.length - 1];
            if (this === lastGradeInput && this.value.trim() !== '') {
              addRow();
            }
          }
        }
      });
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          const gradeInputs = document.querySelectorAll('.grade-input');
          if (this.classList.contains('grade-input')) {
            const wInputs = document.querySelectorAll('.weight-input');
            const idx = Array.from(gradeInputs).indexOf(this);
            if (wInputs[idx]) wInputs[idx].focus();
          } else if (this === document.querySelectorAll('.weight-input')[document.querySelectorAll('.weight-input').length - 1]) {
            addRow();
          } else {
            const wInputs = document.querySelectorAll('.weight-input');
            const idx = Array.from(wInputs).indexOf(this);
            if (gradeInputs[idx + 1]) gradeInputs[idx + 1].focus();
          }
        }
      });
    });

    recalc();
  }

  // ─── Grade parsing ────────────────────────────────────────
  function parseGrade(s) {
    if (!s || !s.trim()) return null;
    s = s.trim().replace(',', '.');
    const letterMap = { 'a': 1, 'b': 1.5, 'c': 2, 'd': 2.5, 'e': 3, 'f': 4 };
    if (letterMap[s.toLowerCase()]) return letterMap[s.toLowerCase()];
    const m = s.match(/^([1-5])([+-]?)$/);
    if (m) {
      let v = parseInt(m[1]);
      if (m[2] === '+') v = Math.max(1, v - 0.5);
      else if (m[2] === '-') v = Math.min(5, v + 0.5);
      return v;
    }
    const n = parseFloat(s);
    if (!isNaN(n) && n >= 1 && n <= 5) return n;
    return null;
  }

  function gradeLabel(avg) {
    if (avg <= 1.5) return { text: 'Výborný', bg: 'rgba(66,196,122,0.15)', color: '#42c47a', border: 'rgba(66,196,122,0.3)' };
    if (avg <= 2.5) return { text: 'Chvalitebný', bg: 'rgba(74,144,226,0.15)', color: '#4a90e2', border: 'rgba(74,144,226,0.3)' };
    if (avg <= 3.5) return { text: 'Dobrý', bg: 'rgba(245,200,66,0.15)', color: '#f5c842', border: 'rgba(245,200,66,0.3)' };
    if (avg <= 4.5) return { text: 'Dostatečný', bg: 'rgba(240,140,40,0.15)', color: '#f08c28', border: 'rgba(240,140,40,0.3)' };
    return { text: 'Nedostatečný', bg: 'rgba(224,85,85,0.15)', color: '#e05555', border: 'rgba(224,85,85,0.3)' };
  }

  // ─── Recalc ───────────────────────────────────────────────
  function recalc() {
    const valid = [];
    rows.forEach(row => {
      const g = parseGrade(row.grade);
      const wRaw = (row.weight || '').trim().replace(',', '.');
      const w = wRaw === '' ? 1 : parseFloat(wRaw);
      if (g !== null && !isNaN(w) && w > 0) valid.push({ g, w, raw: row.grade });
    });

    const wValEl = document.getElementById('wVal');
    const wSubEl = document.getElementById('wSub');
    const aValEl = document.getElementById('aVal');
    const aSubEl = document.getElementById('aSub');
    const badgeEl = document.getElementById('gradeBadge');
    const stCount = document.getElementById('stCount');
    const stWeights = document.getElementById('stWeights');
    const stMinMax = document.getElementById('stMinMax');

    stCount.textContent = valid.length;

    if (valid.length === 0) {
      wValEl.textContent = '—'; wSubEl.textContent = 'Zadej alespoň 1 známku';
      aValEl.textContent = '—'; aSubEl.textContent = 'Průměr bez vah';
      badgeEl.innerHTML = '';
      stWeights.textContent = '—'; stMinMax.textContent = '—';
      return;
    }

    const totalW = valid.reduce((s, x) => s + x.w, 0);
    const weighted = valid.reduce((s, x) => s + x.g * x.w, 0) / totalW;
    const arith = valid.reduce((s, x) => s + x.g, 0) / valid.length;
    const minG = Math.min(...valid.map(x => x.g));
    const maxG = Math.max(...valid.map(x => x.g));

    wValEl.textContent = weighted.toFixed(2);
    aValEl.textContent = arith.toFixed(2);

    const hasCustomWeights = rows.some(r => r.weight.trim() !== '' && r.weight.trim() !== '1');
    wSubEl.textContent = hasCustomWeights
      ? `Vážený ze ${valid.length} ${valid.length === 1 ? 'hodnoty' : 'hodnot'}`
      : 'Všechny váhy = 1';
    aSubEl.textContent = `${valid.length} ${valid.length === 1 ? 'hodnota' : valid.length < 5 ? 'hodnoty' : 'hodnot'}`;

    const gl = gradeLabel(weighted);
    badgeEl.innerHTML = `<div class="grade-badge" style="background:${gl.bg};color:${gl.color};border:1px solid ${gl.border}">${gl.text}</div>`;

    const wDisplay = totalW % 1 === 0 ? totalW : totalW.toFixed(1);
    stWeights.textContent = wDisplay;
    stMinMax.textContent = `${minG % 1 === 0 ? minG : minG.toFixed(1)} / ${maxG % 1 === 0 ? maxG : maxG.toFixed(1)}`;
  }

  // ─── Reset ────────────────────────────────────────────────
  function resetAll() {
    rows = [];
    nextId = 0;
    clearSubject();
    addRow(); addRow(); addRow();
  }

  function copyResult() {
    const wEl = document.getElementById('wVal');
    const aEl = document.getElementById('aVal');
    if (wEl.textContent === '—') { showToast('Nejprve zadej známky'); return; }
    const text = `Vážený průměr: ${wEl.textContent}, Aritmetický průměr: ${aEl.textContent}`;
    navigator.clipboard.writeText(text).then(() => {
      showToast('Průměr zkopírován!');
    }).catch(() => {
      showToast('Kopírování selhalo');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ─── XML Import ───────────────────────────────────────────

  /**
   * Parsuje i4 XML export.
   * Vrací pole: [{ name, grades: [{value, weight, label}] }, ...]
   * 
   * Struktura: každý <Row> po prvním = předmět.
   * První <Cell> = název předmětu.
   * Ostatní <Cell ss:StyleID="jX"> s číselnou hodnotou = známky.
   * Váha je v <Comment><Data> ve tvaru "...váha N,..."
   */
  function parseXML(xmlText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'application/xml');

    // namespace resolver — XML má urn:schemas-microsoft-com:office:spreadsheet
    const ns = 'urn:schemas-microsoft-com:office:spreadsheet';

    // Zkusíme najít všechny Row elementy
    const rows = Array.from(doc.getElementsByTagNameNS(ns, 'Row'));
    // fallback bez namespace
    const rowsNoNS = rows.length > 0 ? rows : Array.from(doc.getElementsByTagName('Row'));

    const subjects = [];

    rowsNoNS.forEach((row, rowIdx) => {
      if (rowIdx === 0) return; // header řádek

      const cells = Array.from(row.childNodes).filter(n => n.nodeType === 1 &&
        (n.localName === 'Cell' || n.tagName === 'Cell'));

      if (!cells.length) return;

      // První buňka = název předmětu
      const firstDataEl = cells[0].querySelector
        ? cells[0].querySelector('Data') || cells[0].getElementsByTagName('Data')[0]
        : null;
      const subjectName = firstDataEl ? firstDataEl.textContent.trim() : '';

      // Přeskočit řádek souhrnu (⌀) a prázdné
      if (!subjectName || subjectName === '⌀') return;

      const grades = [];

      // Buňky 2..N-4 (poslední 4 jsou absence, průměr, přepsání, výsledná)
      // Bezpečnější: projít buňky se StyleID "jX" nebo s číselnou hodnotou
      for (let ci = 1; ci < cells.length - 4; ci++) {
        const cell = cells[ci];
        const dataEl = cell.querySelector
          ? cell.querySelector('Data') || cell.getElementsByTagName('Data')[0]
          : null;
        if (!dataEl) continue;

        const typeAttr = dataEl.getAttributeNS
          ? (dataEl.getAttributeNS(ns, 'Type') || dataEl.getAttribute('ss:Type') || dataEl.getAttribute('Type'))
          : dataEl.getAttribute('ss:Type');

        if (typeAttr === 'Number') {
          const val = parseFloat(dataEl.textContent);
          if (!isNaN(val) && val >= 1 && val <= 5 && Number.isInteger(val)) {
            // Vytáhni váhu z Comment
            const commentData = cell.querySelector
              ? (cell.querySelector('Comment Data') || (() => {
                  const c = cell.getElementsByTagName('Comment')[0];
                  return c ? c.getElementsByTagName('Data')[0] : null;
                })())
              : null;
            let weight = '';
            if (commentData) {
              const commentText = commentData.textContent || '';
              const wMatch = commentText.match(/váha\s+(\d+)/);
              if (wMatch) weight = wMatch[1];
            }
            grades.push({ value: String(val), weight });
          }
        }
      }

      if (grades.length > 0) {
        subjects.push({ name: subjectName, grades });
      }
    });

    return subjects;
  }

  function handleXMLFile(file) {
    if (!file || !file.name.endsWith('.xml')) {
      showToast('Nahraj prosím .xml soubor');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const subjects = parseXML(e.target.result);
        if (!subjects.length) {
          showToast('Žádné předměty nebyly nalezeny');
          return;
        }
        importedSubjects = subjects;
        document.getElementById('importDropText').textContent = file.name;
        openModal(subjects);
      } catch (err) {
        console.error(err);
        showToast('Chyba při čtení XML');
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  // ─── Modal ────────────────────────────────────────────────
  function openModal(subjects) {
    const overlay = document.getElementById('modalOverlay');
    const list = document.getElementById('subjectList');
    const sub = document.getElementById('modalSub');

    sub.textContent = `${subjects.length} předmětů nalezeno`;
    list.innerHTML = '';

    subjects.forEach((subj, idx) => {
      const avg = subj.grades.length
        ? (subj.grades.reduce((s, g) => s + parseFloat(g.value), 0) / subj.grades.length).toFixed(2)
        : null;

      const item = document.createElement('div');
      item.className = 'subject-item';
      item.setAttribute('tabindex', '0');
      item.innerHTML = `
        <span class="subject-item-name">${subj.name}</span>
        <span class="subject-item-meta">
          <span class="subject-item-count">${subj.grades.length} zn.</span>
          ${avg ? `<span class="subject-item-avg">ø ${avg}</span>` : ''}
        </span>
      `;
      item.addEventListener('click', () => loadSubject(idx));
      item.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') loadSubject(idx); });
      list.appendChild(item);
    });

    overlay.classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function loadSubject(idx) {
    closeModal();
    const subj = importedSubjects[idx];
    if (!subj) return;

    // Naplnit rows ze znamek předmětu
    rows = [];
    nextId = 0;
    subj.grades.forEach(g => {
      const id = nextId++;
      rows.push({ id, grade: g.value, weight: g.weight });
    });
    // Přidat prázdný řádek na konec
    rows.push({ id: nextId++, grade: '', weight: '' });

    renderRows();

    // Zobrazit banner
    const banner = document.getElementById('subjectBanner');
    const bannerName = document.getElementById('subjectBannerName');
    bannerName.textContent = subj.name;
    banner.classList.add('visible');

    showToast(`Načteno: ${subj.name}`);
  }

  function clearSubject() {
    document.getElementById('subjectBanner').classList.remove('visible');
  }

  // ─── File input + drag&drop ───────────────────────────────
  const xmlInput = document.getElementById('xmlFileInput');
  const drop = document.getElementById('importDrop');

  xmlInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleXMLFile(e.target.files[0]);
    e.target.value = '';
  });

  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag-over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
  drop.addEventListener('drop', (e) => {
    e.preventDefault();
    drop.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleXMLFile(file);
  });

  // Zavřít modal kliknutím mimo
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // ─── Service Worker ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // ─── Init ─────────────────────────────────────────────────
  resetAll();
</script>
</body>
</html>
