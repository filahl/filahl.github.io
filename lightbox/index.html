<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lightbox</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Jacquard+24&display=swap');


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --accent: #f5c842;
    }

    body {
      background: #111;
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* ── SETUP SCREEN ── */
    #setupScreen {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 32px 24px;
      overflow-y: auto;
    }




    .logo {
      margin-top: auto;
      font-family: "Jacquard 24", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 28px;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 6px;
    }

    .logo span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 48px;
      text-align: center;
    }

    .upload-zone {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 4/3;
      border: 2px dashed #333;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
    }

    .upload-zone:active {
      border-color: var(--accent);
      background: #1e1c14;
    }

    .upload-zone img#preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .upload-icon {
      font-size: 40px;
      line-height: 1;
      color: #888;
    }

    .upload-label {
      font-size: 14px;
      color: #555;
      text-align: center;
      line-height: 1.5;
    }

    .upload-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      font-size: 13px;
      color: #fff;
      opacity: 0;
      transition: 0.2s;
      z-index: 2;
    }

    .upload-zone:active .upload-overlay {
      opacity: 1;
    }

    #fileInput {
      display: none;
    }

    /* Controls */
    .controls {
      width: 100%;
      max-width: 340px;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }

    .slider-label span:last-child {
      color: var(--accent);
      font-weight: 500;
    }

    input[type=range] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #333;
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Mode toggles */
    .modes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #888;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .mode-btn .mode-icon {
      font-size: 18px;
      display: block;
      margin-bottom: 4px;
    }

    .mode-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1e1c14;
    }

    .mode-btn:active {
      transform: scale(0.96);
    }

    /* Start button */
    .start-btn {
      margin-bottom: auto;
      width: 100%;
      max-width: 340px;
      background: var(--accent);
      color: #111;
      font-family: "Jacquard 24", system-ui;
      font-weight: 400;
      font-size: 26px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .start-btn:disabled {
      opacity: 0.35;
    }

    .start-btn:not(:disabled):active {
      transform: scale(0.97);
      background: #e0b530;
    }

    /* ── LIGHTBOX SCREEN ── */
    #lightboxScreen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #fff;
      flex-direction: column;
      touch-action: none;
    }

    #lightboxScreen.active {
      display: flex;
    }

    #lightboxCanvas {
      flex: 1;
      width: 100%;
      object-fit: contain;
      display: block;
    }

    /* Floating controls */
    .lb-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.3s ease;
    }

    .lb-controls.hidden {
      transform: translateY(100%);
    }

    .lb-slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #888;
    }

    .lb-slider-row label {
      width: 70px;
      flex-shrink: 0;
    }

    .lb-slider-row input[type=range] {
      flex: 1;
    }

    .lb-slider-row .val {
      width: 35px;
      text-align: right;
      color: var(--accent);
      font-size: 11px;
    }

    .lb-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .lb-btn {
      flex: 1;
      min-width: 22%;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      padding: 11px 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .lb-btn i {
      font-size: 14px;
    }

    .lb-btn:active {
      transform: scale(0.94);
      background: #2a2a2a;
    }

    .lb-btn.exit {
      border-color: #f5c842;
      color: #f5c842;
    }

    .lb-btn.lock {
      border-color: #42a1f5;
      color: #42a1f5;
    }

    .tap-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .tap-hint.show {
      opacity: 1;
    }

    .rotate-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
      pointer-events: none;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Unlock button */
    .unlock-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      z-index: 1000;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .unlock-btn.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
    <filter id="edge-preview">
      <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 1 0"
        result="gray" />
      <feConvolveMatrix order="3 3" kernelMatrix="-1 -1 -1 -1 8 -1 -1 -1 -1" preserveAlpha="true" in="gray"
        result="edge" />
      <feComponentTransfer in="edge">
        <feFuncR type="linear" slope="-1" intercept="1" />
        <feFuncG type="linear" slope="-1" intercept="1" />
        <feFuncB type="linear" slope="-1" intercept="1" />
      </feComponentTransfer>
    </filter>
  </svg>

  <div id="setupScreen">
    <div class="logo">Light<span>box</span></div>
    <div class="subtitle">Vlož obrázek → polož telefon pod papír → obkresli</div>

    <div class="upload-zone" id="uploadZone">
      <img id="preview" alt="">
      <i class="bi bi-image upload-icon"></i>
      <div class="upload-label">Klepni a vyber<br>obrázek z galerie</div>
      <div class="upload-overlay">Změnit obrázek</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="controls">
      <div class="slider-row">
        <div class="slider-label"><span>Jas obrazovky</span><span id="brightnessLabel">100%</span></div>
        <input type="range" id="brightnessSlider" min="0" max="200" value="100">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Kontrast</span><span id="contrastLabel">100%</span></div>
        <input type="range" id="contrastSlider" min="0" max="300" value="100">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Otočení</span><span id="rotationLabel">0°</span></div>
        <input type="range" id="rotationSlider" min="0" max="270" step="90" value="0">
      </div>
      <div class="modes">
        <button class="mode-btn active" id="modeNormal" data-mode="normal">
          <span class="mode-icon"><i class="bi bi-palette"></i></span> Barevný
        </button>
        <button class="mode-btn" id="modeGray" data-mode="gray">
          <span class="mode-icon"><i class="bi bi-circle-half"></i></span> Černobílý
        </button>
        <button class="mode-btn" id="modeInvert" data-mode="invert">
          <span class="mode-icon"><i class="bi bi-moon-stars"></i></span> Invertovaný
        </button>
        <button class="mode-btn" id="modeEdge" data-mode="edge">
          <span class="mode-icon"><i class="bi bi-pencil"></i></span> Obrysy
        </button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" disabled>Zapnout Lightbox</button>
  </div>

  <div id="lightboxScreen">
    <canvas id="lightboxCanvas"></canvas>
    <div class="tap-hint" id="tapHint">Klepni pro ovládání<br><small>(Lze přibližovat a posouvat)</small></div>
    <div class="rotate-indicator" id="rotateIndicator"></div>
    <button id="unlockBtn" class="unlock-btn hidden"><i class="bi bi-unlock-fill"></i> Odemknout</button>

    <div class="lb-controls hidden" id="lbControls">
      <div class="lb-slider-row">
        <label>Jas</label><input type="range" id="lbBrightness" min="0" max="200" value="100">
        <div class="val" id="lbBrightnessVal">100%</div>
      </div>
      <div class="lb-slider-row">
        <label>Kontrast</label><input type="range" id="lbContrast" min="0" max="300" value="100">
        <div class="val" id="lbContrastVal">100%</div>
      </div>
      <div class="lb-slider-row">
        <label>Průhlednost</label><input type="range" id="lbOpacity" min="10" max="100" value="100">
        <div class="val" id="lbOpacityVal">100%</div>
      </div>
      <div class="lb-actions">
        <button class="lb-btn" id="lbRotate"><i class="bi bi-arrow-clockwise"></i> Otočit</button>
        <button class="lb-btn" id="lbFlipH"><i class="bi bi-symmetry-vertical"></i> Zrcadlit</button>
        <button class="lb-btn" id="lbReset"><i class="bi bi-aspect-ratio"></i> Reset</button>
        <button class="lb-btn lock" id="lbLock"><i class="bi bi-lock-fill"></i> Zamknout</button>
        <button class="lb-btn exit" id="exitBtn"><i class="bi bi-x-lg"></i> Zpět</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    let imgEl = null;
    let settings = { brightness: 100, contrast: 100, rotation: 0, mode: 'normal', opacity: 100, flipH: false };
    let controlsVisible = false;
    let isLocked = false;
    let hideTimeout;

    // ── Pan & Zoom State ──
    let panX = 0, panY = 0;
    let zoom = 1;
    let isGesturing = false;
    let touchStartDist = 0;
    let initialZoom = 1;
    let startPanX = 0, startPanY = 0;
    let lastTouchX = 0, lastTouchY = 0;
    let hasMoved = false;

    // ── Setup screen ──
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');

    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-label').style.display = 'none';

      imgEl = new Image();
      imgEl.onload = () => {
        startBtn.disabled = false;
        renderSetupPreview();
      };
      imgEl.src = url;
    });

    function bindSetupSlider(id, labelId, key) {
      const el = document.getElementById(id);
      const label = document.getElementById(labelId);
      el.addEventListener('input', () => {
        const v = parseInt(el.value);
        settings[key] = v;
        label.textContent = key === 'rotation' ? v + '°' : v + '%';
        if (imgEl) renderSetupPreview();
      });
    }
    bindSetupSlider('brightnessSlider', 'brightnessLabel', 'brightness');
    bindSetupSlider('contrastSlider', 'contrastLabel', 'contrast');
    bindSetupSlider('rotationSlider', 'rotationLabel', 'rotation');

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        settings.mode = btn.dataset.mode;
        if (imgEl) renderSetupPreview();
      });
    });

    function renderSetupPreview() {
      preview.style.filter = buildFilter(settings.brightness, settings.contrast);
      preview.style.transform = `rotate(${settings.rotation}deg)`;
    }

    function buildFilter(brightness, contrast) {
      if (settings.mode === 'edge') {
        return `brightness(${brightness}%) contrast(${contrast}%) url(#edge-preview)`;
      }
      let f = `brightness(${brightness}%) contrast(${contrast}%)`;
      if (settings.mode === 'gray') f += ' grayscale(1)';
      if (settings.mode === 'invert') f += ' invert(1)';
      return f;
    }

    startBtn.addEventListener('click', enterLightbox);

    // ── Lightbox ──
    const lightboxScreen = document.getElementById('lightboxScreen');
    const lbCanvas = document.getElementById('lightboxCanvas');
    const ctx = lbCanvas.getContext('2d');
    const lbControls = document.getElementById('lbControls');
    const tapHint = document.getElementById('tapHint');
    const rotateIndicator = document.getElementById('rotateIndicator');
    const unlockBtn = document.getElementById('unlockBtn');

    function enterLightbox() {
      lightboxScreen.classList.add('active');
      document.getElementById('lbBrightness').value = settings.brightness;
      document.getElementById('lbBrightnessVal').textContent = settings.brightness + '%';
      document.getElementById('lbContrast').value = settings.contrast;
      document.getElementById('lbContrastVal').textContent = settings.contrast + '%';

      try { if (navigator.wakeLock) navigator.wakeLock.request('screen'); } catch (e) { }

      panX = 0; panY = 0; zoom = 1; isLocked = false;
      unlockBtn.classList.add('hidden');
      renderLightbox();

      tapHint.classList.add('show');
      setTimeout(() => tapHint.classList.remove('show'), 3000);
    }

    function renderLightbox() {
      if (!imgEl) return;
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      lbCanvas.width = sw;
      lbCanvas.height = sh;

      ctx.clearRect(0, 0, sw, sh);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, sw, sh);

      ctx.save();
      ctx.globalAlpha = settings.opacity / 100;

      const rot = settings.rotation;
      const flipped = settings.flipH;
      const swapped = rot === 90 || rot === 270;
      const drawW = swapped ? sh : sw;
      const drawH = swapped ? sw : sh;

      const scale = Math.min(drawW / imgEl.width, drawH / imgEl.height);
      const dw = imgEl.width * scale;
      const dh = imgEl.height * scale;

      ctx.translate(sw / 2 + panX, sh / 2 + panY);
      ctx.scale(zoom, zoom);
      ctx.rotate(rot * Math.PI / 180);
      if (flipped) ctx.scale(-1, 1);

      if (settings.mode === 'edge') {
        ctx.filter = `brightness(${settings.brightness}%) contrast(${settings.contrast}%) grayscale(1)`;
        ctx.drawImage(imgEl, -dw / 2, -dh / 2, dw, dh);

        ctx.globalCompositeOperation = 'difference';
        ctx.drawImage(imgEl, -dw / 2 + 2, -dh / 2 + 2, dw, dh);

        ctx.fillStyle = 'white';
        ctx.fillRect(-dw / 2, -dh / 2, dw + 2, dh + 2);
        ctx.globalCompositeOperation = 'source-over';
      } else {
        let f = `brightness(${settings.brightness}%) contrast(${settings.contrast}%)`;
        if (settings.mode === 'gray') f += ' grayscale(1)';
        if (settings.mode === 'invert') f += ' invert(1) brightness(150%)';
        ctx.filter = f;
        ctx.drawImage(imgEl, -dw / 2, -dh / 2, dw, dh);
      }

      ctx.restore();

      rotateIndicator.innerHTML = rot + '°' + (flipped ? ' <i class="bi bi-symmetry-vertical"></i>' : '') + ` (${Math.round(zoom * 100)}%)`;
    }

    // Obsolete renderEdgeOverlay removed

    // ── Touch Handling ──
    function getTouchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    lightboxScreen.addEventListener('touchstart', (e) => {
      if (lbControls.contains(e.target) || e.target === unlockBtn) return;
      if (isLocked) return;

      hasMoved = false;

      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        startPanX = panX;
        startPanY = panY;
      } else if (e.touches.length === 2) {
        isGesturing = true;
        touchStartDist = getTouchDist(e.touches);
        initialZoom = zoom;
        lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        startPanX = panX;
        startPanY = panY;
      }
    }, { passive: false });

    lightboxScreen.addEventListener('touchmove', (e) => {
      if (lbControls.contains(e.target) || e.target === unlockBtn) return;
      if (isLocked) { e.preventDefault(); return; }

      e.preventDefault();
      hasMoved = true;

      if (e.touches.length === 1 && !isGesturing) {
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        panX = startPanX + dx;
        panY = startPanY + dy;
        renderLightbox();
      } else if (e.touches.length === 2) {
        const currentDist = getTouchDist(e.touches);
        zoom = Math.max(0.1, Math.min(15, initialZoom * (currentDist / touchStartDist)));

        const currentCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const currentCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        panX = startPanX + (currentCenterX - lastTouchX);
        panY = startPanY + (currentCenterY - lastTouchY);

        renderLightbox();
      }
    }, { passive: false });

    lightboxScreen.addEventListener('touchend', (e) => {
      if (lbControls.contains(e.target) || e.target === unlockBtn) return;
      if (isLocked) return;

      if (e.touches.length < 2) isGesturing = false;

      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        startPanX = panX;
        startPanY = panY;
      }

      // Zobrazení menu
      if (!hasMoved && e.touches.length === 0) {
        controlsVisible = !controlsVisible;
        lbControls.classList.toggle('hidden', !controlsVisible);
        if (controlsVisible) {
          clearTimeout(hideTimeout);
          hideTimeout = setTimeout(() => {
            controlsVisible = false;
            lbControls.classList.add('hidden');
          }, 5000);
        }
      }
    });

    // Zamykání a odemykání
    document.getElementById('lbLock').addEventListener('click', () => {
      isLocked = true;
      controlsVisible = false;
      lbControls.classList.add('hidden');
      unlockBtn.classList.remove('hidden');
      tapHint.innerHTML = '<i class="bi bi-lock-fill"></i> Obrazovka zamčena<br><small>(Kresli bez obav)</small>';
      tapHint.classList.add('show');
      setTimeout(() => tapHint.classList.remove('show'), 2500);
    });

    unlockBtn.addEventListener('click', () => {
      isLocked = false;
      unlockBtn.classList.add('hidden');
      controlsVisible = true;
      lbControls.classList.remove('hidden');
      clearTimeout(hideTimeout);
    });

    // LB sliders & buttons
    function bindLbSlider(id, valId, key) {
      const el = document.getElementById(id);
      const val = document.getElementById(valId);
      el.addEventListener('input', () => {
        settings[key] = parseInt(el.value);
        val.textContent = settings[key] + '%';
        renderLightbox();
      });
    }
    bindLbSlider('lbBrightness', 'lbBrightnessVal', 'brightness');
    bindLbSlider('lbContrast', 'lbContrastVal', 'contrast');
    bindLbSlider('lbOpacity', 'lbOpacityVal', 'opacity');

    document.getElementById('lbRotate').addEventListener('click', () => {
      settings.rotation = (settings.rotation + 90) % 360;
      renderLightbox();
    });

    document.getElementById('lbFlipH').addEventListener('click', () => {
      settings.flipH = !settings.flipH;
      renderLightbox();
    });

    document.getElementById('lbReset').addEventListener('click', () => {
      panX = 0; panY = 0; zoom = 1;
      renderLightbox();
    });

    document.getElementById('exitBtn').addEventListener('click', () => {
      lightboxScreen.classList.remove('active');
      lbControls.classList.add('hidden');
      controlsVisible = false;
    });

    window.addEventListener('resize', () => {
      if (lightboxScreen.classList.contains('active')) renderLightbox();
    });
  </script>
</body>

</html>
