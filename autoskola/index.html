<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz Dopravních Značek ČR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --asphalt: #1a1a1e;
    --asphalt-mid: #25252b;
    --asphalt-light: #2e2e36;
    --stripe: #f5c518;
    --stripe-dim: #c9a010;
    --white: #f0ede8;
    --muted: #888890;
    --danger: #e84040;
    --success: #4caf6a;
    --border: rgba(245,197,24,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--asphalt);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 48px,
        rgba(255,255,255,0.015) 48px,
        rgba(255,255,255,0.015) 50px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 48px,
        rgba(255,255,255,0.015) 48px,
        rgba(255,255,255,0.015) 50px
      );
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0 1.5rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--stripe);
    line-height: 1;
  }

  .logo span {
    color: var(--white);
    opacity: 0.5;
    font-size: 13px;
    display: block;
    font-family: 'DM Mono', monospace;
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .streak-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .streak-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--stripe);
    line-height: 1;
    transition: transform 0.15s, color 0.2s;
  }

  .streak-count.bump {
    transform: scale(1.3);
    color: #fff;
  }

  /* MAIN CARD */
  .card {
    background: var(--asphalt-mid);
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    display: block;
    height: 4px;
    background: var(--stripe);
  }

  /* SIGN STAGE */
  .sign-stage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    background: var(--asphalt-light);
    position: relative;
  }

  .sign-stage::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, var(--asphalt-light) 100%);
  }

  #sign-img {
    max-height: 140px;
    max-width: 200px;
    position: relative;
    z-index: 1;
    transition: opacity 0.2s, transform 0.2s;
  }

  /* QUESTION AREA */
  .question-area {
    padding: 1.5rem 1.5rem 1rem;
  }

  .question-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .question-text {
    font-size: 17px;
    color: var(--white);
    font-weight: 500;
    line-height: 1.4;
  }

  /* OPTIONS */
  .options-wrap {
    padding: 0 1.5rem 1.5rem;
    display: grid;
    gap: 8px;
  }

  .opt-btn {
    all: unset;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--asphalt-light);
    color: var(--white);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.3;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--stripe);
    background: rgba(245,197,24,0.07);
  }

  .opt-btn .key {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 16px;
    transition: color 0.15s;
  }

  .opt-btn:hover:not(:disabled) .key {
    color: var(--stripe);
  }

  .opt-btn.correct {
    border-color: var(--success);
    background: rgba(76,175,106,0.12);
    color: var(--success);
  }
  .opt-btn.correct .key { color: var(--success); }

  .opt-btn.wrong {
    border-color: var(--danger);
    background: rgba(232,64,64,0.1);
    color: var(--danger);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .opt-btn:disabled { cursor: not-allowed; }

  /* FEEDBACK */
  .feedback {
    margin: 0 1.5rem 1.5rem;
    padding: 14px 16px;
    border-radius: 3px;
    background: var(--asphalt);
    border-left: 3px solid var(--stripe);
    display: none;
    animation: slideDown 0.2s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .feedback.show { display: block; }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .result-title.ok { color: var(--success); }
  .result-title.fail { color: var(--danger); }

  .info-row {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .info-row strong {
    color: var(--white);
    font-weight: 500;
  }

  /* NEXT BTN */
  .next-wrap {
    padding: 0 1.5rem 1.5rem;
  }

  .next-btn {
    all: unset;
    cursor: pointer;
    width: 100%;
    text-align: center;
    background: var(--stripe);
    color: var(--asphalt);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 13px;
    border-radius: 3px;
    transition: background 0.15s, transform 0.1s;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { background: #ffd438; }
  .next-btn:active { transform: scale(0.98); }

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      Znáš Značky
      <span>KVÍZ ČR</span>
    </div>
    <div class="streak-badge">
      <div class="streak-label">streak</div>
      <div class="streak-count" id="streak">0</div>
    </div>
  </div>

  <div class="card" id="quiz-card">
    <div class="sign-stage">
      <img id="sign-img" src="" alt="Dopravní značka">
    </div>

    <div class="question-area">
      <div class="question-label">Jaká je tato značka?</div>
      <div class="question-text" id="question-text">Vyberte správnou odpověď</div>
    </div>

    <div class="options-wrap" id="options"></div>

    <div class="feedback" id="feedback">
      <div class="result-title" id="result-title"></div>
      <div class="info-row" id="info-row">
        <strong>Typ:</strong> <span id="info-type"></span><br>
        <strong>Popis:</strong> <span id="info-desc"></span>
      </div>
    </div>

    <div class="next-wrap">
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Další značka →</button>
    </div>
  </div>
</div>

let streak = 0;
let currentSign = null;
const wikiBase = "https://commons.wikimedia.org/wiki/Special:FilePath/";

function init() {
    streak = 0;
    updateStreakDisplay();
    nextQuestion();
}

function nextQuestion() {
    // Reset UI
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('next-btn').classList.remove('show');
    document.getElementById('options').innerHTML = '';
    
    // 1. Vybrat náhodnou značku
    currentSign = signsData[Math.floor(Math.random() * signsData.length)];
    document.getElementById('sign-img').src = wikiBase + currentSign.img;

    // 2. Vyfiltrovat značky STEJNÉHO TYPU (pro zmatení hráče)
    let similarSigns = signsData.filter(sign => sign.type === currentSign.type && sign.name !== currentSign.name);
    
    // Možnosti začínají správnou odpovědí
    let options = [currentSign.name];
    
    // 3. Vybrat matoucí možnosti (celkem 3 odpovědi)
    while(options.length < 3) {
        let randomName;
        
        if (similarSigns.length > 0) {
            let randomIndex = Math.floor(Math.random() * similarSigns.length);
            randomName = similarSigns[randomIndex].name;
            similarSigns.splice(randomIndex, 1);
        } else {
            randomName = signsData[Math.floor(Math.random() * signsData.length)].name;
        }
        
        if(!options.includes(randomName)) {
            options.push(randomName);
        }
    }
    
    // Zamíchat pole odpovědí
    options.sort(() => Math.random() - 0.5);

    // Vykreslit tlačítka
    const keyLabels = ['A', 'B', 'C'];
    options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn'; // Přidáno kvůli CSS
        btn.dataset.answer = opt;  // Uložení odpovědi pro kontrolu
        btn.innerHTML = `<span class="key">${keyLabels[index]}</span> ${opt}`;
        btn.onclick = () => checkAnswer(opt, btn);
        document.getElementById('options').appendChild(btn);
    });
}

function checkAnswer(answer, btn) {
    const allButtons = document.querySelectorAll('.opt-btn');
    allButtons.forEach(b => b.disabled = true);

    const resultTitle = document.getElementById('result-title');

    if(answer === currentSign.name) {
        btn.classList.add('correct');
        streak++;
        resultTitle.innerHTML = "Správně! 🎉";
        resultTitle.className = "result-title ok"; // Pro obarvení nadpisu
        
        // Drobná animace skóre
        const streakEl = document.getElementById('streak');
        streakEl.classList.add('bump');
        setTimeout(() => streakEl.classList.remove('bump'), 200);

    } else {
        btn.classList.add('wrong');
        streak = 0;
        resultTitle.innerHTML = `Chyba! Správně bylo: ${currentSign.name}`;
        resultTitle.className = "result-title fail";

        // Zvýraznit tu správnou
        allButtons.forEach(b => { 
            if(b.dataset.answer === currentSign.name) {
                b.classList.add('correct'); 
            }
        });
    }

    updateStreakDisplay();
    showFeedback();
}

function updateStreakDisplay() {
    document.getElementById('streak').innerText = streak;
}

function showFeedback() {
    document.getElementById('info-type').innerText = currentSign.type;
    document.getElementById('info-desc').innerText = currentSign.desc;
    document.getElementById('feedback').classList.add('show');
    document.getElementById('next-btn').classList.add('show'); // Ukážeme tlačítko pro pokračování
}

// Spuštění kvízu
init();
</script>
